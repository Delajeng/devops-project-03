name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  IMAGE_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/devops-project-03

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Run tests and linting
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt -r requirements-dev.txt

      - name: Lint
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: flake8 app/ tests/ --max-line-length=100

      - name: Test with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build Docker image, scan with Trivy, push to ECR
  # Only runs if Job 1 passes
  # ─────────────────────────────────────────────────────────────
  build-and-scan:
    name: Build, Scan, Push to ECR
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_URI }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_URI }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to ECR (main branch only, after scan passes)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_URI }}:${{ github.sha }}
            ${{ env.IMAGE_URI }}:latest
          cache-from: type=gha

  # ─────────────────────────────────────────────────────────────
  # Job 3: Post summary comment on PRs
  # Only runs on pull requests, after Jobs 1 and 2 pass
  # ─────────────────────────────────────────────────────────────
  notify:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [test, build-and-scan]
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "✅ Tests passed · Trivy scan clean · Safe to merge."
            })